<!-- Interactive Logic Script -->
<script>
        let currentFare = 4.50;
        const fareDisplay = document.getElementById('fare-display');
        const heatProgress = document.getElementById('heat-progress');
        const heatLabel = document.getElementById('heat-label');

        function updateFare(delta) {
            currentFare = Math.max(2.50, currentFare + delta);
            fareDisplay.textContent = currentFare.toFixed(2);
            
            // Simulate heat change
            let heat;
            if (currentFare < 4.00) {
                heat = Math.floor(30 + Math.random() * 20);
                heatLabel.textContent = `Low (${heat}%)`;
                heatLabel.className = "text-error font-bold";
            } else if (currentFare < 5.00) {
                heat = Math.floor(75 + Math.random() * 15);
                heatLabel.textContent = `High (${heat}%)`;
                heatLabel.className = "text-primary font-bold";
            } else {
                heat = Math.floor(95 + Math.random() * 5);
                heatLabel.textContent = `Instant (${heat}%)`;
                heatLabel.className = "text-tertiary font-bold";
            }
            
            heatProgress.style.width = heat + '%';
            
            // Add subtle pulse on update
            fareDisplay.parentElement.classList.add('scale-110');
            setTimeout(() => {
                fareDisplay.parentElement.classList.remove('scale-110');
            }, 200);
        }

        // Automatic heat fluctuation for realism
        setInterval(() => {
            let variance = (Math.random() - 0.5) * 4;
            let currentWidth = parseFloat(heatProgress.style.width);
            heatProgress.style.width = Math.min(100, Math.max(10, currentWidth + variance)) + '%';
        }, 3000);
    </script>

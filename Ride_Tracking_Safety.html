<script>
        // Micro-interactions and simulation logic
        document.addEventListener('DOMContentLoaded', () => {
            const statusText = document.querySelector('.tracking-wider');
            const sensorIcon = document.querySelector('.animate-pulse');
            
            // Randomly simulate sensor data fluctuation
            setInterval(() => {
                const gForceBars = document.querySelectorAll('.flex.gap-0\\.5 div');
                gForceBars.forEach(bar => {
                    const randomHeight = Math.floor(Math.random() * 8) + 4;
                    bar.style.height = `${randomHeight}px`;
                    bar.style.opacity = Math.random() > 0.5 ? '1' : '0.4';
                });
            }, 500);

            // Subtle parallax on map
            window.addEventListener('deviceorientation', (event) => {
                const map = document.querySelector('img[data-location]');
                if (event.beta && event.gamma) {
                    const x = event.gamma / 10;
                    const y = event.beta / 10;
                    map.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
                }
            });
        });
    </script>

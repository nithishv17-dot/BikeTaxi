<!-- FAB Suppression Applied: No FAB on primary home screen per guidelines unless aligned perfectly with action -->
<script>
        // Micro-interactions for glassmorphism movement
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const sheets = document.querySelectorAll('.glass-level-3');
            sheets.forEach(sheet => {
                const offsetX = (x - 0.5) * 10;
                const offsetY = (y - 0.5) * 10;
                sheet.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0)`;
            });
        });

        // Toggle simple active states for bike selection
        const bikeCards = document.querySelectorAll('.grid button');
        bikeCards.forEach(card => {
            card.addEventListener('click', () => {
                bikeCards.forEach(c => {
                    c.classList.remove('border-primary/50');
                    c.classList.add('border-white/5');
                    c.classList.add('opacity-60');
                    const icon = c.querySelector('.absolute.top-0');
                    if(icon) icon.remove();
                });
                card.classList.add('border-primary/50');
                card.classList.remove('border-white/5');
                card.classList.remove('opacity-60');
                
                const check = document.createElement('div');
                check.className = 'absolute top-0 right-0 p-2';
                check.innerHTML = '<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: \'FILL\' 1;">check_circle</span>';
                card.appendChild(check);
            });
        });
    </script>
